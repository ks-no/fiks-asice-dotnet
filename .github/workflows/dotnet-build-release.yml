name: .NET Library Build and Release

on:
  workflow_dispatch:
    inputs:
      isRelease:
        description: 'Release build? (signs with DigiCert KeyLocker and publishes to nuget.org)'
        type: boolean
        required: false
        default: false
      pushToNugetOrg:
        description: 'Push an unsigned pre-release to nuget.org?'
        type: boolean
        required: false
        default: false
      specifiedVersion:
        description: 'Version (X.X.X) - leave empty for auto'
        required: false
        default: ''
      releaseNotes:
        description: 'Release notes'
        required: false
        default: 'No changes specified'
      reviewer:
        description: 'Reviewer name'
        required: false
        default: 'No review required'
  push:
    branches:
      - '**'

permissions:
  contents: write
  checks: write
  id-token: write

jobs:
  build:
    uses: ks-no/github-actions-public/.github/workflows/dotnet-library-build.yml@main
    with:
      is-release: ${{ inputs.isRelease == true }}
      push-to-nuget-org: ${{ inputs.pushToNugetOrg == true }}
      specified-version: ${{ inputs.specifiedVersion || '' }}
      release-notes: ${{ inputs.releaseNotes || 'No changes specified' }}
      reviewer: ${{ inputs.reviewer || 'No review required' }}
      integration-test-repo: fiks-asice-dotnet-integration-tests
      integration-test-workflow: testsuite.yml
      integration-test-package-name: KS.Fiks.ASiC-E
    secrets: inherit
